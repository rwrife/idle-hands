name: Release

# Publish cross-compiled binaries whenever a version tag (v*) is pushed.
# Tagging is the maintainer action that ships a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog/version are correct

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
