name: Release

# Publish cross-compiled binaries whenever a version tag (v*) is pushed.
# Tagging is the maintainer action that ships a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog/version are correct

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pin to the v2 line that supports this config (the archives
          # `formats:` field landed in GoReleaser v2.6). A bare "~> v2"
          # floats to whatever v2.x is newest at tag time, so a future
          # breaking change could fail the release with no warning. The
          # release-check job in ci.yml exercises this same version on
          # every PR so breakage surfaces before a tag is ever pushed.
          version: "~> v2.6"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
